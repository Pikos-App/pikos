<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <title>Pikos — monochrome</title>
  <desc>Pikos mark using currentColor. For menu bar (template images), terminal, or any context where the ink color should inherit.</desc>

  <rect x="84" y="44" width="64" height="88" rx="6"
        fill="none" stroke="currentColor" stroke-width="5"
        opacity="0.45"/>
  <rect x="68" y="56" width="64" height="88" rx="6"
        fill="none" stroke="currentColor" stroke-width="5"
        opacity="0.75"/>
  <rect x="52" y="68" width="64" height="88" rx="6"
        fill="currentColor"/>
</svg>
