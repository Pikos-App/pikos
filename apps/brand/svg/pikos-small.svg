<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <title>Pikos — small size (terracotta, thicker strokes)</title>
  <desc>Optimized for rendering at 16-32px. Stroke widths bumped from 5 to 7 so outlines stay visible when rasterized small.</desc>

  <rect x="84" y="44" width="64" height="88" rx="6"
        fill="none" stroke="#c06a58" stroke-width="7"
        opacity="0.45"/>
  <rect x="68" y="56" width="64" height="88" rx="6"
        fill="none" stroke="#c06a58" stroke-width="7"
        opacity="0.75"/>
  <rect x="52" y="68" width="64" height="88" rx="6"
        fill="#c06a58"/>
</svg>
