<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/pikos-symbol.svg" />
    <title>Pikos</title>
    <meta name="theme-color" content="#161613" />
    <script>
      (function () {
        var t = localStorage.getItem("pikos-theme");
        // "system" follows OS preference; anything else (including null) defaults to dark.
        var dark =
          t === "system"
            ? window.matchMedia("(prefers-color-scheme: dark)").matches
            : t !== "light";
        if (dark) document.documentElement.classList.add("dark");
        // Sync meta theme-color with resolved theme
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute("content", dark ? "#161613" : "#ffffff");
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
