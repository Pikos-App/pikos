name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PNPM_VERSION: 10

jobs:
  # ── Job 1: Quality (fast, ~30s) ────────────────────────────────────────────
  quality:
    name: Format, Lint & Types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Biome (format + lint)
        run: pnpm --filter @pikos/desktop biome check src/

      - name: TypeScript — desktop
        run: pnpm --filter @pikos/desktop tsc --noEmit

      - name: TypeScript — core
        run: pnpm --filter @pikos/core tsc --noEmit

  # ── Job 2: Tests (depends on quality) ─────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Unit tests (Vitest)
        run: pnpm --filter @pikos/core vitest run

      - name: Install Playwright browsers
        run: pnpm --filter @pikos/desktop playwright install --with-deps chromium

      - name: E2E tests (Playwright — Vite dev server, no Tauri)
        run: pnpm --filter @pikos/desktop playwright test

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/desktop/playwright-report/
          retention-days: 7

  # ── Job 3: Build (depends on test) ────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm turbo build

      - name: Verify dist output exists
        run: test -d apps/desktop/dist && echo "✓ dist built"
