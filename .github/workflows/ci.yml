name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PNPM_VERSION: 10.30.3

jobs:
  # ── Job 1: Tests ────────────────────────────────────────────────────────────
  # Quality checks (typecheck, lint, prettier, depcruise) run locally via
  # the pre-push git hook. CI owns tests + build which need a clean environment.
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Unit tests (Vitest)
        run: pnpm turbo test

      - name: Install Playwright browsers
        run: pnpm --filter @pikos/desktop exec playwright install --with-deps chromium

      - name: E2E tests (Playwright)
        run: pnpm --filter @pikos/desktop exec playwright test

  # ── Job 2: Build ────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm turbo build

      - name: Verify dist output exists
        run: test -d apps/desktop/dist && echo "✓ dist built"
